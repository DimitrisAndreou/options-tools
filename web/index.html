<!DOCTYPE html>

<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="scaffolded-by" content="https://github.com/dart-lang/sdk">
  <title>Options Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/echarts@latest/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.1.1/dist/ag-grid-community.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.1.1/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.1.1/styles/ag-theme-alpine-dark.css">
</head>

<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <h2 class="mb-0">
          <img src="favicon.png" alt="icon" style="height: 1.5em; margin-right: 0.5em; vertical-align: middle;">
          Options Lab
        </h2>
        <span>
          <div class="container py-3">
            <p class="mb-1">By optionakias@</p>
            <div>
              <a href="https://x.com/optionakias" class="text-white mx-1"><i class="fab fa-twitter"></i></a>
              <a href="https://github.com/DimitrisAndreou/options-tools/" class="text-white mx-1"><i
                  class="fab fa-github"></i></a>
              <a href="https://discord.gg/TbbEsBRku9" class="text-white mx-1"><i class="fab fa-discord"></i></a>
              <a href="https://linktr.ee/optionakias" class="text-white mx-1" title="Linktree">🌳</a>
            </div>
          </div>
        </span>
      </div>
    </div>
  </header>

  <!-- Ticker Input Form -->
  <div class="card shadow-sm border-0 bg-dark mb-4">
    <div class="card-body">
      <form id="ticker-form" class="d-flex flex-wrap align-items-center mb-0 row-gap-3 column-gap-4">
        <!-- Ticker Input Group -->
        <div class="d-flex align-items-center">
          <label for="ticker-input" class="text-white me-3 fw-bold mb-0">Ticker Symbol:</label>
          <input type="text" id="ticker-input" name="ticker"
            class="form-control me-3 bg-secondary text-white border-0 font-monospace" placeholder="e.g., GOOG, BTC, ..."
            style="max-width: 200px; text-transform: uppercase;" required>
          <button type="submit" class="btn btn-primary">Load Data</button>
        </div>

        <!-- Slippage Group -->
        <div class="d-flex align-items-center">
          <label for="slippage-input" class="text-white me-2 fw-bold mb-0">Slippage:</label>
          <input type="range" id="slippage-input" class="form-range" style="max-width: 150px;" min="0" max="1" step="0.1"
            value="0.5" list="slippage-ticks">
          <datalist id="slippage-ticks">
            <option value="0.0"></option>
            <option value="0.1"></option>
            <option value="0.2"></option>
            <option value="0.3"></option>
            <option value="0.4"></option>
            <option value="0.5"></option>
            <option value="0.6"></option>
            <option value="0.7"></option>
            <option value="0.8"></option>
            <option value="0.9"></option>
            <option value="1.0"></option>
          </datalist>
          <span id="slippage-value" class="text-white ms-2" style="font-family: monospace; min-width: 45px;">50%</span>
        </div>

        <!-- DTE Group -->
        <div class="d-flex align-items-center">
          <label class="text-white me-2 fw-bold mb-0">DTE:</label>
          <div class="dual-slider-container position-relative ms-2 me-3" style="width: 150px; height: 30px;">
            <div class="position-absolute w-100" style="height: 6px; background: #334155; top: 12px; border-radius: 10px; z-index: 1;"></div>
            <div class="position-absolute" id="dte-slider-range" style="height: 6px; background: var(--primary); top: 12px; border-radius: 10px; z-index: 2;"></div>
            <input type="range" id="min-dte-input" min="0" max="1095" step="1" value="7">
            <input type="range" id="max-dte-input" min="0" max="1095" step="1" value="1095">
          </div>
          <span id="dte-value-display" class="text-white ms-2" style="font-family: monospace; min-width: 105px;">7 - 1095 d</span>
        </div>
      </form>
    </div>
  </div>

  <!-- Spot Price Display -->
  <div class="card shadow-sm border-0 bg-dark mb-4">
    <div class="card-body">
      <h5 class="text-white mb-0">Spot Price: <span id="spot-price" class="fw-bold" style="color: #00ff00;"></span></h5>
    </div>
  </div>

  <div class="container-fluid">
    <div class="row">
      <!-- Chart -->
      <div class="col-lg-6 col-12">
        <div class="card mb-4 mb-lg-0 h-100">
          <div class="card-header">
            <h5>
              <i class="fas fa-chart-line me-2 text-primary"></i>Covered Calls
            </h5>
          </div>
          <div class="card-body">
            <div id="coveredCallsChart" class="chart-container"></div>
          </div>
        </div>
      </div>
      <!-- Strategy Details Panel -->
      <div class="col-lg-6 col-12">
        <div class="card h-100">
          <div class="card-header">
            <h5>
              <i class="fas fa-info-circle me-2 text-primary"></i>Strategy Details
            </h5>
          </div>
          <div class="card-body">
            <div id="coveredCallDetailsPanel" class="text-white" style="font-family: monospace;">
              Select a point on the chart or a row in the table to view details.
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Table Row -->
    <div class="row mt-4">
      <div class="col-12">
        <div class="card">
          <div class="card-header">
            <h5>
              <i class="fas fa-table me-2 text-primary"></i>Table: Covered Calls
            </h5>
          </div>
          <div class="card-body">
            <div id="coveredCallsTable" class="ag-theme-alpine-dark" style="width: 100%; height: 500px;"></div>
          </div>
        </div>
      </div>
    </div>
    <!-- Row -->
    <div class="row mt-4">
      <!-- Chart -->
      <div class="col-xxl-6 col-12">
        <div class="card">
          <div class="card-header">
            <h5>
              <i class="fas fa-chart-line me-2 text-primary"></i>Overs/Unders
            </h5>
          </div>
          <div class="card-body">
            <div id="verticalSpreadsChart" class="chart-container"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Footer -->
  <footer class="text-center">
    <div class="container py-3">
      <p class="mb-1">© 2025</p>
    </div>
  </footer>
  <!-- Bootstrap JS Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="option_tools.js"></script>
  <script src="main.js"></script>
  <script defer src="main.dart.js"></script>
</body>

</html>
