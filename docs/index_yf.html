<!DOCTYPE html>

<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="scaffolded-by" content="https://github.com/dart-lang/sdk">
  <title>Options Tools</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/echarts@latest/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.1.1/dist/ag-grid-community.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.1.1/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.1.1/styles/ag-theme-alpine-dark.css">
</head>

<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <h2 class="mb-0">
          <img src="favicon.png" alt="icon" style="height: 1.5em; margin-right: 0.5em; vertical-align: middle;">
          Crypto Options Lab
        </h2>
        <span>
          <div class="container py-3">
            <p class="mb-1">By optionakias@</p>
            <div>
              <a href="https://x.com/optionakias" class="text-white mx-1"><i class="fab fa-twitter"></i></a>
              <a href="https://github.com/DimitrisAndreou/options-tools/" class="text-white mx-1"><i
                  class="fab fa-github"></i></a>
              <a href="https://discord.gg/TbbEsBRku9" class="text-white mx-1"><i class="fab fa-discord"></i></a>
              <a href="https://linktr.ee/optionakias" class="text-white mx-1" title="Linktree">🌳</a>
            </div>
          </div>
        </span>
      </div>
    </div>
  </header>

  <main class="container my-5">
    <div class="card shadow-sm border-0 bg-dark">
      <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
        <span><i class="fas fa-terminal me-2"></i>Output Console</span>
        <button class="btn btn-sm btn-outline-light" onclick="document.getElementById('output-log').value = ''">Clear</button>
      </div>
      <div class="card-body p-0">
        <textarea 
          id="output-log" 
          class="form-control bg-dark text-success border-0 font-monospace" 
          rows="15" 
          readonly 
          placeholder="Waiting for data..."
          style="resize: none; outline: none; box-shadow: none; padding: 15px;"></textarea>
      </div>
    </div>
  </main>
 
  <!-- Footer -->
  <footer class="text-center">
    <div class="container py-3">
      <p class="mb-1">© 2025</p>
    </div>
  </footer>
  <!-- Bootstrap JS Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Handle tab switching to properly resize charts
    document
      .querySelectorAll('button[data-bs-toggle="tab"]')
      .forEach((tab) => {
        tab.addEventListener("shown.bs.tab", (event) => {
          window.dispatchEvent(new Event("resize"));
        });
      });
  </script>
  <script src="yf_main.js"></script>
  <script defer src="yf_main.dart.js"></script>
</body>

</html>
